<svg width="864" height="1080" viewBox="0 0 864 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glorious Resurrection Light -->
    <radialGradient id="sunburstElite" cx="50%" cy="40%" r="65%" fx="50%" fy="40%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#6366F1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Real Rim Light Effect -->
    <filter id="rimGlowCross" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#FDE68A" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="hillTextured" x1="432" y1="700" x2="432" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#242220"/>
      <stop offset="1" stop-color="#161412"/>
    </linearGradient>
  </defs>

  <!-- The Light -->
  <circle cx="432" cy="450" r="500" fill="url(#sunburstElite)"/>

  <!-- The Hill (Hand-drawn organic path) -->
  <path d="M-100 1080V850C50 800 250 760 432 760C614 760 814 800 964 850V1080H-100Z" fill="url(#hillTextured)"/>
  <path d="M-100 850C50 800 250 760 432 760C614 760 814 800 964 850" stroke="rgba(253, 230, 138, 0.2)" stroke-width="2"/>

  <!-- The Heroic Crosses with Rim Light -->
  <g filter="url(#rimGlowCross)" transform="translate(0, -20)">
    <!-- Central Cross -->
    <rect x="414" y="320" width="36" height="460" fill="#0C0A09" rx="1"/>
    <rect x="310" y="430" width="244" height="32" fill="#0C0A09" rx="1"/>
    
    <!-- Defined Side Crosses -->
    <g transform="rotate(-7 260 550)">
      <rect x="250" y="550" width="18" height="280" fill="#0C0A09" rx="1"/>
      <rect x="200" y="620" width="110" height="16" fill="#0C0A09" rx="1"/>
    </g>
    <g transform="rotate(7 604 550)">
      <rect x="594" y="550" width="18" height="280" fill="#0C0A09" rx="1"/>
      <rect x="544" y="620" width="110" height="16" fill="#0C0A09" rx="1"/>
    </g>
  </g>

  <!-- Clear Empty Tomb -->
  <g transform="translate(140, 820)">
    <path d="M0 160C0 70 60 0 140 0C220 0 280 70 280 160V260H0V160Z" fill="#0C0A09"/>
    <path d="M25 160C25 90 75 40 140 40C205 40 255 90 255 160V260H25V160Z" fill="url(#tombGlowElite)"/>
    <circle cx="360" cy="180" r="150" fill="#1C1A18" stroke="rgba(255,255,255,0.05)"/>
  </g>

  <defs>
    <radialGradient id="tombGlowElite" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
