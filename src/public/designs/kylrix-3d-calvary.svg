<svg width="864" height="1080" viewBox="0 0 864 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Light & Shadow for 3D faces -->
    <linearGradient id="frontFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C1A18"/>
      <stop offset="100%" stop-color="#0C0A09"/>
    </linearGradient>
    <linearGradient id="sideFace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0C0A09"/>
      <stop offset="100%" stop-color="#050404"/>
    </linearGradient>
    
    <!-- Intense Resurrection Rim-Light -->
    <filter id="rimBleed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FDE68A" flood-opacity="0.5" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="rimGlow"/>
      <feMerge>
        <feMergeNode in="rimGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grounding Shadow -->
    <radialGradient id="footShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 3D Calvary Group -->
  <g filter="url(#rimBleed)" transform="translate(0, -40)">
    
    <!-- CENTRAL CROSS (Isometric Depth) -->
    <g transform="translate(432, 500)">
      {/* Vertical Beam */}
      <path d="M-20 -250H20V250H-20V-250Z" fill="url(#frontFace)"/> {/* Front */}
      <path d="M20 -250L35 -235V265L20 250V-250Z" fill="url(#sideFace)"/> {/* Side */}
      <path d="M-20 -250L-5 -235H35L20 -250H-20Z" fill="#2D2B29"/> {/* Top */}
      
      {/* Horizontal Beam */}
      <path d="M-140 -120H140V-80H-140V-120Z" fill="url(#frontFace)"/> {/* Front */}
      <path d="M140 -120L155 -105V-65L140 -80V-120Z" fill="url(#sideFace)"/> {/* Side */}
      <path d="M-140 -120L-125 -105H155L140 -120H-140Z" fill="#2D2B29"/> {/* Top */}
      
      {/* Kylrix Core (Diamond Inset) */}
      <path d="M0 -115L15 -100L0 -85L-15 -100Z" fill="#6366F1" opacity="0.8"/>
    </g>

    <!-- LEFT CROSS (Perspective) -->
    <g transform="translate(220, 650) rotate(-10) scale(0.7)">
      <path d="M-15 -200H15V200H-15V-200Z" fill="url(#frontFace)"/>
      <path d="M15 -200L25 -185V215L15 200V-200Z" fill="url(#sideFace)"/>
      <path d="M-110 -100H110V-70H-110V-100Z" fill="url(#frontFace)"/>
    </g>

    <!-- RIGHT CROSS (Perspective) -->
    <g transform="translate(644, 650) rotate(10) scale(0.7)">
      <path d="M-15 -200H15V200H-15V-200Z" fill="url(#frontFace)"/>
      <path d="M15 -200L25 -185V215L15 200V-200Z" fill="url(#sideFace)"/>
      <path d="M-110 -100H110V-70H-110V-100Z" fill="url(#frontFace)"/>
    </g>
  </g>

  <!-- Hill Intersection (Grounded) -->
  <path d="M-100 1080V820C100 780 432 760 864 820V1080H-100Z" fill="#161412"/>
</svg>
