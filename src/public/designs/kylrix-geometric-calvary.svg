<svg width="864" height="1080" viewBox="0 0 864 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="rimGlowTech" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ground Line - Sharp and Minimal -->
  <path d="M0 880H864" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Central Cross - Diamond/Root Identity -->
  <g transform="translate(432, 480)" filter="url(#rimGlowTech)">
    <rect x="-4" y="-200" width="8" height="400" fill="white" opacity="0.9"/>
    <rect x="-100" y="-80" width="200" height="8" fill="white" opacity="0.9"/>
    <!-- Center Diamond Intersection -->
    <path d="M0 -100L20 -80L0 -60L-20 -80Z" fill="#6366F1"/>
  </g>

  <!-- Side Symbols - Slanted Square/Vault Identity -->
  <g transform="translate(220, 620) rotate(-10)" opacity="0.4">
    <rect x="-2" y="-120" width="4" height="240" fill="white"/>
    <rect x="-50" y="-40" width="100" height="4" fill="white"/>
    <rect x="-12" y="-52" width="24" height="24" fill="none" stroke="white" stroke-width="1" transform="skewX(-15)"/>
  </g>

  <g transform="translate(644, 620) rotate(10)" opacity="0.4">
    <rect x="-2" y="-120" width="4" height="240" fill="white"/>
    <rect x="-50" y="-40" width="100" height="4" fill="white"/>
    <rect x="-12" y="-52" width="24" height="24" fill="none" stroke="white" stroke-width="1" transform="skewX(15)"/>
  </g>
</svg>
