<svg width="864" height="1080" viewBox="0 0 864 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sharp Indigo Weaponry Glow -->
    <filter id="shardGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feFlood flood-color="#6366F1" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="obsidianShard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#161412"/>
      <stop offset="1" stop-color="#0A0908"/>
    </linearGradient>

    <!-- Intense Rim Light -->
    <filter id="rimLightIntense">
      <feMorphology operator="dilate" radius="1" in="SourceAlpha" result="dilated"/>
      <feGaussianBlur stdDeviation="2" in="dilated" result="blurred"/>
      <feFlood flood-color="#6366F1" flood-opacity="1" result="indigo"/>
      <feComposite in="indigo" in2="blurred" operator="in" result="rim"/>
      <feMerge>
        <feMergeNode in="rim"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Infinite Void -->
  <rect width="864" height="1080" fill="#0A0908"/>

  <!-- The Geometric Shard Landscape (Abstract Hill) -->
  <g transform="translate(0, 700)">
    <path d="M-100 380L150 120L432 200L700 50L964 380H-100Z" fill="url(#obsidianShard)" stroke="#6366F1" stroke-width="0.5" opacity="0.4"/>
    <path d="M100 380L300 180L550 280L800 150L1000 380H100Z" fill="#0A0908" stroke="#6366F1" stroke-width="1" filter="url(#shardGlow)"/>
  </g>

  <!-- Abstract Calvary: Triple Geometric Light Beams -->
  <g transform="translate(432, 450)" filter="url(#rimLightIntense)">
    <!-- Central Beam -->
    <rect x="-20" y="-250" width="40" height="500" fill="#0A0908" stroke="#6366F1" stroke-width="2"/>
    <rect x="-140" y="-120" width="280" height="30" fill="#0A0908" stroke="#6366F1" stroke-width="2"/>
    
    <!-- Side Fragments -->
    <g transform="translate(-240, 100) rotate(-15)">
      <rect x="-10" y="-150" width="20" height="300" fill="#0A0908" stroke="#6366F1" stroke-width="1"/>
      <rect x="-60" y="-60" width="120" height="12" fill="#0A0908" stroke="#6366F1" stroke-width="1"/>
    </g>
    <g transform="translate(240, 100) rotate(15)">
      <rect x="-10" y="-150" width="20" height="300" fill="#0A0908" stroke="#6366F1" stroke-width="1"/>
      <rect x="-60" y="-60" width="120" height="12" fill="#0A0908" stroke="#6366F1" stroke-width="1"/>
    </g>
  </g>

  <!-- Resurrection Sunburst (Atmospheric Light) -->
  <circle cx="432" cy="450" r="400" fill="radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%)" opacity="0.5"/>
</svg>
